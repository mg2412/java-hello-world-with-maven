version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
    commands:
      - echo "Installing dependencies"

  pre_build:
    commands:
      - echo "Starting Maven build"
      - mvn clean

  build:
    commands:
      - mvn package

  post_build:
    commands:
      - echo "Build completed successfully"

artifacts:
  files:
    - target/*.jar

